<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhammad Nafiz | Bio Link</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-color: #000;
            color: #fff;
        }

      
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: grayscale(100%) brightness(40%) contrast(120%);
        }

      
        .container {
            width: 100%;
            max-width: 430px;
            padding: 40px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
        }


        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .profile-img:hover {
            transform: scale(1.05);
        }

      
        .name {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

      
        .subtitle {
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

      
        .links-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        
        .glass-btn {
            width: 100%;
            padding: 16px 20px;
            text-decoration: none;
            color: #ffffff;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 0.5px;
            border-radius: 16px; 
            
          
            background: rgba(255, 255, 255, 0.14);
            backdrop-filter: blur(15px) saturate(120%);
            -webkit-backdrop-filter: blur(15px) saturate(120%);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: block;
        }

        
        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.1);
        }

        .glass-btn:active {
            transform: translateY(1px) scale(0.98);
            background: rgba(255, 255, 255, 0.1);
        }

        
        .footer {
            margin-top: 50px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <video class="video-background" autoplay loop muted playsinline id="bgVideo">
        <source src="tina.mp4" type="video/mp4">
        
    </video>

    <div class="container">
        
        <img src="nafiz.jpg" alt="Muhammad Nafiz" class="profile-img">

        <h1 class="name">MUHAMMADNAFIZ</h1>
        <p class="subtitle">Welcome to my web page</p>

        <div class="links-wrapper">
            
            <a href="https://www.instagram.com/_muhammadnafizzz?igsh=MTI2ZWcxZjlhOHVkNg==" target="_blank" class="glass-btn">
                instagram
            </a>

            <a href="https://www.instagram.com/tinaa_____tin?igsh=Y21icjVoMGxqYXBy" target="_blank" class="glass-btn">
                her Instagram
            </a>

            <a href="https://www.tiktok.com/@fzx_1233?_r=1&_t=ZS-96cDqDHxLNA" target="_blank" class="glass-btn">
                tik tok
            </a>
            
        </div>

        <div class="footer">
            &copy; 2026 MUHAMMAD NAFIZ. All Rights Reserved.
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const video = document.getElementById('bgVideo');
            
            
            if (video) {
                video.play().catch(function(error) {
                    console.log("Autoplay sempat tertahan, mencoba memutar ulang otomatis...", error);
                  
                    document.body.addEventListener('click', function() {
                        video.play();
                    }, { once: true });
                });
            }
        });
    </script>

</body>
</html>
